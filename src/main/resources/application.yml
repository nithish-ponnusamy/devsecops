spring:
  application:
    name: devsecops-app

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/devsecops}
      database: devsecops

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
